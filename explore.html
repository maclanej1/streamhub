<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub — Movies, TV, Sports & Live TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1014;
    --bg2: #0a0f18;
    --surface: #1a1d24;
    --surface2: #252830;
    --card-bg: #1c1f26;
    --border: #2a2d35;
    --text: #f0f2f5;
    --text2: #9ca3af;
    --text3: #6b7280;
    --accent: #ef4444;
    --accent-hover: #dc2626;
    --accent-muted: rgba(239,68,68,0.15);
    --green: #22c55e;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-display: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  .nav {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 20px; position: sticky; top: 0; z-index: 50;
    overflow-x: auto; height: 52px;
  }
  .nav .logo {
    font-size: 22px; font-weight: 800; margin-right: 20px;
    font-family: var(--font-display); letter-spacing: 0.04em;
    padding: 14px 0; white-space: nowrap;
  }
  .nav .logo span { color: var(--accent); }
  .nav a {
    padding: 14px 18px; text-decoration: none;
    font-size: 13px; font-weight: 600; color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: var(--transition); white-space: nowrap; letter-spacing: 0.02em;
  }
  .nav a:hover { color: var(--text); }
  .nav a.active { color: var(--text); border-bottom-color: var(--accent); }
  .nav .nav-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
  .nav .nav-search-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 16px; padding: 8px 12px; border-radius: 6px;
    transition: var(--transition);
  }
  .nav .nav-search-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  .hero {
    position: relative; width: 100%; min-height: 480px;
    display: flex; align-items: flex-end; overflow: hidden;
    border-radius: var(--radius-lg); margin-bottom: 32px;
  }
  .hero-backdrop { position: absolute; inset: 0; background: var(--bg2); }
  .hero-backdrop img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .hero-backdrop .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--bg) 0%, rgba(15,16,20,0.4) 50%, rgba(15,16,20,0.1) 100%),
                linear-gradient(to right, var(--bg) 0%, transparent 40%);
  }
  .hero-content {
    position: relative; z-index: 2; display: flex; gap: 28px;
    padding: 40px 32px; width: 100%; max-width: 1200px; margin: 0 auto; align-items: flex-end;
  }
  .hero-poster { flex-shrink: 0; width: 180px; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
  .hero-poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .hero-info { flex: 1; padding-bottom: 8px; }
  .hero-info .hero-badge {
    display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; padding: 4px 10px; border-radius: 4px;
    background: var(--accent-muted); color: var(--accent); margin-bottom: 10px;
  }
  .hero-info h1 {
    font-family: var(--font-display); font-size: 48px; line-height: 1.05;
    letter-spacing: 0.04em; font-weight: 400; margin-bottom: 8px;
  }
  .hero-meta { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; font-size: 13px; color: var(--text2); margin-bottom: 14px; }
  .hero-meta .rating { display: flex; align-items: center; gap: 4px; color: var(--orange); font-weight: 600; }
  .hero-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }
  .hero-overview { font-size: 14px; line-height: 1.6; color: var(--text2); max-width: 640px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 18px; }
  .hero-actions { display: flex; gap: 10px; }
  .hero-actions .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: scale(1.03); }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-secondary:hover { background: rgba(255,255,255,0.14); }

  .tray { margin-bottom: 32px; }
  .tray-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .tray-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .tray-header .see-all {
    font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer;
    transition: var(--transition); text-decoration: none; background: none; border: none; padding: 4px 8px;
  }
  .tray-header .see-all:hover { color: var(--text); }
  .tray-scroll {
    display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 8px;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  }
  .tray-scroll::-webkit-scrollbar { height: 4px; }

  .card {
    flex-shrink: 0; width: 152px; cursor: pointer; border-radius: 8px;
    overflow: hidden; background: var(--card-bg); transition: var(--transition);
    scroll-snap-align: start; border: 1px solid transparent;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.04);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
  }
  .card-poster { aspect-ratio: 2/3; background: var(--surface2); overflow: hidden; position: relative; }
  .card-poster img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
  .card:hover .card-poster img { transform: scale(1.05); }
  .card-poster .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    opacity: 0; transition: var(--transition); display: flex; align-items: flex-end; padding: 10px;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-overlay .play-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .card-meta { padding: 10px 10px 12px; }
  .card-meta .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .card-meta .sub { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .card-meta .sub .badge { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; }
  .badge-movie { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-tv { background: var(--accent-muted); color: var(--accent); }

  .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(152px, 1fr)); gap: 14px; }
  .grid-view .card { width: auto; }
  .back-row {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
    color: var(--text2); cursor: pointer; padding: 6px 0; margin-bottom: 16px;
    transition: var(--transition); background: none; border: none;
  }
  .back-row:hover { color: var(--text); }

  .search-area { margin-bottom: 24px; }
  .search-bar { display: flex; gap: 8px; }
  .search-bar input {
    flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none; transition: var(--transition);
  }
  .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
  .search-bar select {
    padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px; outline: none; cursor: pointer;
  }
  .search-bar button {
    padding: 10px 24px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; transition: var(--transition);
  }
  .search-bar button:hover { background: var(--accent-hover); }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .section-header h2 { font-size: 22px; font-weight: 700; }
  .section-header .sub { font-size: 13px; color: var(--text2); }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--surface); border-radius: 8px; padding: 3px; flex-wrap: wrap; }
  .tabs button { padding: 7px 16px; border: none; border-radius: 6px; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; transition: var(--transition); }
  .tabs button:hover { color: var(--text); }
  .tabs button.active { background: var(--accent); color: #fff; }

  .sport-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .sport-card {
    background: var(--card-bg); border-radius: var(--radius);
    padding: 14px 16px; border: 1px solid var(--border);
    transition: var(--transition); cursor: pointer;
    position: relative; overflow: hidden;
    min-height: 80px;
  }
  .sport-card:hover { border-color: rgba(255,255,255,0.1); background: var(--surface); transform: translateY(-2px); }
  .sport-card .sport-bg {
    position: absolute; inset: 0; opacity: 0.07;
    background-size: cover; background-position: center;
    transition: var(--transition);
  }
  .sport-card:hover .sport-bg { opacity: 0.12; }
  .sport-card .sport-content { position: relative; z-index: 1; }
  .sport-card .teams { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sport-card .teams .badge-img { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text2); overflow: hidden; flex-shrink: 0; }
  .sport-card .teams .badge-img img { width: 100%; height: 100%; object-fit: cover; }
  .sport-card .teams .vs { font-size: 12px; color: var(--text2); flex-shrink: 0; }
  .sport-card .teams .team-name { font-size: 14px; font-weight: 600; }
  .sport-card .match-info { font-size: 12px; color: var(--text2); }
  .sport-card .match-info .tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-right: 6px; text-transform: uppercase; }
  .sport-card .match-info .tag.live { background: rgba(239,68,68,0.15); color: var(--accent); }
  .sport-card .match-info .tag.upcoming { background: rgba(59,130,246,0.15); color: var(--blue); }
  .sport-card .match-info .tag.finished { background: rgba(34,197,94,0.15); color: var(--green); }

  .tv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .tv-header h2 { font-size: 22px; font-weight: 700; }
  .tv-header .sub { font-size: 13px; color: var(--text2); }
  .tv-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .tv-controls .tv-search { flex: 1; min-width: 200px; display: flex; gap: 8px; }
  .tv-controls .tv-search input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-family: var(--font); outline: none; transition: var(--transition); }
  .tv-controls .tv-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
  .tv-controls .tv-search button { padding: 10px 18px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-weight: 700; font-size: 12px; cursor: pointer; transition: var(--transition); white-space: nowrap; }
  .tv-controls .tv-search button:hover { background: var(--accent-hover); }
  .tv-country-pills { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 8px; -webkit-overflow-scrolling: touch; margin-bottom: 4px; }
  .tv-country-pills::-webkit-scrollbar { height: 3px; }
  .tv-country-pills .pill { flex-shrink: 0; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 11px; font-weight: 600; transition: var(--transition); text-transform: uppercase; letter-spacing: 0.04em; }
  .tv-country-pills .pill:hover { border-color: var(--accent); color: var(--text); }
  .tv-country-pills .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
  .channel-card {
    background: var(--card-bg); border-radius: var(--radius-lg);
    padding: 20px 14px 16px; border: 1px solid var(--border);
    text-align: center; cursor: pointer; transition: var(--transition);
    position: relative; overflow: hidden;
  }
  .channel-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(255,255,255,0.12);
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  }
  .channel-card .ch-logo {
    width: 72px; height: 72px; margin: 0 auto 10px;
    border-radius: 12px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: var(--text2);
    overflow: hidden; transition: var(--transition);
  }
  .channel-card:hover .ch-logo { transform: scale(1.06); }
  .channel-card .ch-logo img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
  .channel-card .ch-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .channel-card .ch-status { font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .channel-card .ch-status.online { color: var(--green); }
  .channel-card .ch-status.online .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; animation: live-pulse 1.5s ease-in-out infinite; }
  @keyframes live-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .channel-card .ch-status.offline { color: var(--text3); }
  .channel-card .ch-status .country-tag { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-left: 4px; }
  .channel-card .ch-online-bg {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--green), #4ade80);
  }
  .channel-card .ch-category { font-size: 10px; color: var(--text3); margin-top: 4px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .filters .pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 600; transition: var(--transition); }
  .filters .pill:hover { border-color: var(--accent); color: var(--text); }
  .filters .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filters .count { font-size: 12px; color: var(--text2); margin-left: auto; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .card:focus-visible, .sport-card:focus-visible, .channel-card:focus-visible {
    transform: translateY(-4px);
    box-shadow: 0 0 0 2px var(--accent), 0 12px 32px rgba(0,0,0,0.5);
  }
  [tabindex]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .fav-btn {
    background: none; border: none; cursor: pointer; font-size: 15px;
    padding: 2px 6px; transition: var(--transition); opacity: 0.3;
    line-height: 1; color: var(--text);
  }
  .fav-btn:hover { opacity: 0.8; }
  .fav-btn.active { opacity: 1; color: var(--accent); }

  .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-player { width: 100%; max-width: 960px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
  .modal-player .close-btn { position: absolute; top: 10px; right: 10px; z-index: 10; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.7); color: #fff; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
  .modal-player .close-btn:hover { background: rgba(0,0,0,0.9); }
  .modal-player iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
  .modal-player .player-info { padding: 14px 18px; background: var(--surface); }
  .modal-player .player-info h3 { font-size: 16px; }
  .modal-player .player-info p { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .stream-picker { display: none; position: fixed; inset: 0; z-index: 90; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 16px; }
  .stream-picker.show { display: flex; }
  .stream-picker-inner { background: var(--surface); border-radius: var(--radius-lg); max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 24px; }
  .stream-picker-inner h3 { font-size: 17px; margin-bottom: 4px; }
  .stream-picker-inner .sp-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .stream-picker-inner .close-sp { float: right; background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 0 4px; transition: var(--transition); }
  .stream-picker-inner .close-sp:hover { color: var(--text); }
  .stream-picker-inner .stream-opt { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; transition: var(--transition); margin-bottom: 6px; font-size: 13px; }
  .stream-picker-inner .stream-opt:hover { border-color: var(--accent); background: var(--surface2); }
  .stream-picker-inner .stream-opt .hd-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: var(--accent-muted); color: var(--accent); }
  .stream-picker-inner .stream-opt .sd-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: rgba(156,163,175,0.15); color: var(--text2); }
  .stream-picker-inner .stream-opt .src-name { font-size: 11px; color: var(--text2); }

  .fav-tray { margin-bottom: 24px; }
  .fav-tray .fav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .fav-tray .fav-header h2 { font-size: 18px; font-weight: 700; }
  .fav-tray .fav-header .clear-favs { font-size: 12px; color: var(--text2); cursor: pointer; background: none; border: none; transition: var(--transition); }
  .fav-tray .fav-header .clear-favs:hover { color: var(--accent); }
  .fav-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 8px; scroll-snap-type: x mandatory; }
  .fav-scroll .fav-chip {
    flex-shrink: 0; scroll-snap-align: start;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 20px;
    background: var(--card-bg); border: 1px solid var(--border);
    cursor: pointer; transition: var(--transition);
    font-size: 13px; font-weight: 500;
  }
  .fav-scroll .fav-chip:hover { border-color: var(--accent); background: var(--surface); }
  .fav-scroll .fav-chip .fav-remove { font-size: 14px; opacity: 0.3; transition: var(--transition); margin-left: 4px; }
  .fav-scroll .fav-chip .fav-remove:hover { opacity: 1; color: var(--accent); }
  .fav-scroll .fav-chip .fav-icon { font-size: 16px; }

  .loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 20px; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state h3 { font-size: 16px; margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  .section { display: none; }
  .section.active { display: block; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 20px; }

  @media (max-width: 768px) {
    .hero { min-height: 360px; border-radius: 0; margin-left: -12px; margin-right: -12px; }
    .hero-content { flex-direction: column; align-items: flex-start; padding: 28px 20px; }
    .hero-poster { width: 120px; }
    .hero-info h1 { font-size: 32px; }
    .hero-overview { -webkit-line-clamp: 2; }
    .card { width: 130px; }
    .grid-view { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .container { padding: 12px 12px; }
    .nav { padding: 0 12px; }

    .card { width: 110px; }
    .grid-view { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }

</style>
</head>

<script>
const CONFIG = {
  TMDB_KEY: 'b91089a3798f16c46765b0ec1978d7e9',
  TMDB_LANG: 'en-US',
};

const TMDB_BASE = 'https://api.themoviedb.org/3';

async function tmdbFetch(url) {
  if (!CONFIG.TMDB_KEY) throw new Error('TMDB_API_KEY missing');
  const r = await fetch(`${url}${url.includes('?')?'&':'?'}api_key=${CONFIG.TMDB_KEY}&language=${CONFIG.TMDB_LANG}`);
  if (!r.ok) throw new Error('TMDB error ' + r.status);
  return r.json();
}

function tmdbImage(path, size='w500') {
  return path ? `https://image.tmdb.org/t/p/${size}${path}` : null;
}

function switchSection(name) {
  document.querySelectorAll('.nav a').forEach(x => x.classList.remove('active'));
  document.querySelector('.nav a[data-section="' + name + '"]')?.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.getElementById('movie-nav-right').style.display = name === 'movies' ? 'flex' : 'none';
}

document.querySelectorAll('.nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    switchSection(a.dataset.section);
  });
});

// ════════════════════════════════════════════
// FAVORITES (localStorage)
// ════════════════════════════════════════════
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('sh_favs')) || []; } catch { return []; }
}
function saveFavorites(f) { localStorage.setItem('sh_favs', JSON.stringify(f)); }
function isFavorite(id) { return getFavorites().some(f => f.id === id); }
function toggleFavorite(id, name, extra) {
  let favs = getFavorites();
  const idx = favs.findIndex(f => f.id === id);
  if (idx > -1) { favs.splice(idx, 1); } else { favs.push({ id, name, ...extra }); }
  saveFavorites(favs);
  renderFavTray();
  return idx === -1;
}

// ════════════════════════════════════════════
// KEYBOARD / TV REMOTE NAVIGATION
// ════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('streamPicker').classList.contains('show')) closeStreamPicker();
    else if (document.getElementById('playerModal').classList.contains('show')) closePlayer();
  }
  if (e.key === 'Enter') {
    const el = document.activeElement;
    if (el && el.click) el.click();
  }
  // Arrow key horizontal scroll for focused tray
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    const el = document.activeElement;
    const scroll = el?.closest('.tray-scroll, .fav-scroll');
    if (scroll) { scroll.scrollBy({ left: e.key === 'ArrowLeft' ? -200 : 200, behavior: 'smooth' }); e.preventDefault(); }
  }
});

let heroItem = null;
let currentCategory = '';
let currentCategoryTitle = '';
let categoryPage = 1;

function renderFavTray() {
  const favs = getFavorites();
  const el = document.getElementById('fav-tray');
  if (!el) return;
  if (!favs.length) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  let html = `<div class="fav-tray"><div class="fav-header"><h2>★ Favorites</h2><button class="clear-favs" onclick="if(confirm('Clear all favorites?')){saveFavorites([]);renderFavTray();}">Clear All</button></div><div class="fav-scroll">`;
  for (const f of favs) {
    if (f.type === 'ch') {
      html += `<div class="fav-chip" onclick="openTVChannel('${encodeURIComponent(f.name)}','${f.code}')" tabindex="0" role="button">
        <span class="fav-icon">📺</span><span>${f.name}</span>
        <span class="fav-remove" onclick="event.stopPropagation();toggleFavorite('${f.id}','${f.name.replace(/'/g,'')}');renderFavTray()">✕</span>
      </div>`;
    } else if (f.type === 'tm') {
      html += `<div class="fav-chip" onclick="openSportStream('${f.id}')" tabindex="0" role="button">
        <span class="fav-icon">⚽</span><span>${f.name}</span>
        <span class="fav-remove" onclick="event.stopPropagation();toggleFavorite('${f.id}','${f.name.replace(/'/g,'')}');renderFavTray()">✕</span>
      </div>`;
    }
  }
  html += '</div></div>';
  el.innerHTML = html;
}

async function loadMovieHome() {
  const trays = document.getElementById('movie-trays');
  trays.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('movie-content').innerHTML = '';
  document.getElementById('movie-search-area').style.display = 'none';

  try {
    const [trending, movies, tv] = await Promise.all([
      tmdbFetch(`${TMDB_BASE}/trending/all/week`),
      tmdbFetch(`${TMDB_BASE}/movie/popular`),
      tmdbFetch(`${TMDB_BASE}/tv/popular`),
    ]);

    if (trending.results?.length) renderHero(trending.results[0]);

    let html = '<div id="fav-tray"></div>';
    if (trending.results?.length) html += renderTray('Trending This Week', trending.results.slice(0, 20), 'trending');
    if (movies.results?.length) html += renderTray('Popular Movies', movies.results.slice(0, 20), 'movie');
    if (tv.results?.length) html += renderTray('Popular TV Shows', tv.results.slice(0, 20), 'tv');

    try {
      const [nowPlaying, topRated] = await Promise.all([
        tmdbFetch(`${TMDB_BASE}/movie/now_playing`),
        tmdbFetch(`${TMDB_BASE}/tv/top_rated`),
      ]);
      if (nowPlaying.results?.length) html += renderTray('Now Playing', nowPlaying.results.slice(0, 20), 'now_playing');
      if (topRated.results?.length) html += renderTray('Top Rated TV', topRated.results.slice(0, 20), 'top_rated');
    } catch(e) {}

    trays.innerHTML = html;
    renderFavTray();
  } catch (e) {
    trays.innerHTML = `<div class="empty-state"><h3>Error loading</h3><p>${e.message}</p></div>`;
  }
}

function renderHero(item) {
  heroItem = item;
  const title = item.title || item.name || 'Unknown';
  const year = (item.release_date || item.first_air_date || '').slice(0, 4);
  const type = item.media_type || (item.title ? 'movie' : 'tv');
  const backdrop = tmdbImage(item.backdrop_path, 'original');
  const poster = tmdbImage(item.poster_path, 'w342');
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const overview = item.overview || '';

  const bg = document.getElementById('hero-bg-img');
  if (backdrop) { bg.src = backdrop; bg.style.display = 'block'; } else bg.style.display = 'none';
  const p = document.getElementById('hero-poster-img');
  if (poster) { p.src = poster; p.style.display = 'block'; } else p.style.display = 'none';
  document.getElementById('hero-title').textContent = title;
  document.getElementById('hero-year').textContent = year;
  document.getElementById('hero-rating-val').textContent = rating;
  document.getElementById('hero-type').textContent = type === 'movie' ? 'Movie' : 'TV Show';
  document.getElementById('hero-overview').textContent = overview;
  document.getElementById('hero-watch-btn').onclick = () => openMedia(type, item.id, title);
}

function renderTray(title, items, category) {
  let html = `<div class="tray"><div class="tray-header"><h2>${title}</h2><button class="see-all" onclick="showCategory('${category}','${title}')">See All →</button></div><div class="tray-scroll">`;
  for (const item of items) html += renderCard(item);
  html += '</div></div>';
  return html;
}

function renderCard(item) {
  const title = item.title || item.name || 'Unknown';
  const year = (item.release_date || item.first_air_date || '').slice(0, 4);
  const type = item.media_type || (item.title ? 'movie' : 'tv');
  const poster = tmdbImage(item.poster_path, 'w342');
  const id = item.id;
  return `<div class="card" tabindex="0" role="button" onclick="openMedia('${type}','${id}','${encodeURIComponent(title)}')">
    <div class="card-poster">
      ${poster ? `<img src="${poster}" alt="${title}" loading="lazy">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:32px;">🎬</div>'}
      <div class="card-overlay"><div class="play-icon">▶</div></div>
    </div>
    <div class="card-meta">
      <div class="title">${title}</div>
      <div class="sub"><span>${year || '—'}</span><span class="badge badge-${type}">${type === 'movie' ? 'Movie' : 'TV'}</span></div>
    </div>
  </div>`;
}

async function showCategory(category, title) {
  currentCategory = category; currentCategoryTitle = title; categoryPage = 1;
  document.getElementById('movie-trays').innerHTML = '';
  document.getElementById('movie-content').innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  document.getElementById('movie-search-area').style.display = 'none';
  loadCategoryPage();
}

async function loadCategoryPage() {
  const el = document.getElementById('movie-content');
  try {
    let data;
    const p = categoryPage;
    switch (currentCategory) {
      case 'trending': data = await tmdbFetch(`${TMDB_BASE}/trending/all/week?page=${p}`); break;
      case 'movie': data = await tmdbFetch(`${TMDB_BASE}/movie/popular?page=${p}`); break;
      case 'tv': data = await tmdbFetch(`${TMDB_BASE}/tv/popular?page=${p}`); break;
      case 'now_playing': data = await tmdbFetch(`${TMDB_BASE}/movie/now_playing?page=${p}`); break;
      case 'top_rated': data = await tmdbFetch(`${TMDB_BASE}/tv/top_rated?page=${p}`); break;
      default: data = await tmdbFetch(`${TMDB_BASE}/trending/all/week?page=${p}`);
    }
    if (!data.results || !data.results.length) { el.innerHTML = '<div class="empty-state"><h3>No results</h3></div>'; return; }
    let html = `<button class="back-row" onclick="backToHome()">← Back to Browse</button><div class="section-header"><h2>${currentCategoryTitle}</h2></div><div class="grid-view">`;
    for (const item of data.results) html += renderCard(item);
    html += '</div>';
    if (data.total_pages > 1) {
      html += `<div style="text-align:center;padding:24px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="pill" onclick="categoryPage--;loadCategoryPage()" ${categoryPage<=1?'disabled':''} style="${categoryPage<=1?'opacity:0.4;':''}">← Prev</button>
        <span style="font-size:13px;color:var(--text2);padding:6px 12px;">Page ${categoryPage} of ${data.total_pages}</span>
        <button class="pill" onclick="categoryPage++;loadCategoryPage()" ${categoryPage>=data.total_pages?'disabled':''} style="${categoryPage>=data.total_pages?'opacity:0.4;':''}">Next →</button>
      </div>`;
    }
    el.innerHTML = html;
  } catch (e) { el.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${e.message}</p></div>`; }
}

function backToHome() {
  document.getElementById('movie-content').innerHTML = '';
  document.getElementById('movie-search-area').style.display = 'none';
  document.getElementById('movie-trays').innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading...</span></div>';
  loadMovieHome();
}

function showSearch() {
  document.getElementById('movie-trays').innerHTML = '';
  document.getElementById('movie-content').innerHTML = '';
  document.getElementById('movie-search-area').style.display = 'block';
  document.getElementById('movie-search-input').focus();
}

async function movieSearch() {
  const q = document.getElementById('movie-search-input').value.trim();
  if (!q) return;
  const type = document.getElementById('movie-type-select').value;
  const el = document.getElementById('movie-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Searching...</span></div>';
  try {
    const data = await tmdbFetch(`${TMDB_BASE}/search/${type}?query=${encodeURIComponent(q)}`);
    if (!data.results || !data.results.length) { el.innerHTML = '<div class="empty-state"><h3>No results found</h3><p>Try a different search term</p></div>'; return; }
    let html = `<button class="back-row" onclick="backToHome()">← Back to Browse</button><div class="grid-view">`;
    for (const item of data.results) html += renderCard(item);
    html += '</div>';
    el.innerHTML = html;
  } catch (e) { el.innerHTML = `<div class="empty-state"><h3>Search error</h3><p>${e.message}</p></div>`; }
}

function openMedia(type, id, title) {
  const d = decodeURIComponent(title);
  if (type === 'movie') openPlayer(`https://vidsync.live/embed/movie/${id}?autoPlay=true`, d, 'Movie');
  else openPlayer(`https://vidsync.live/embed/tv/${id}/1/1?autoPlay=true&autoNext=true`, d, 'TV Show (S1 E1)');
}

function openPlayer(url, title, desc) {
  document.getElementById('playerFrame').src = url;
  document.getElementById('playerTitle').textContent = title || 'Now Playing';
  document.getElementById('playerDesc').textContent = desc || '';
  document.getElementById('playerModal').classList.add('show');
}

function closePlayer() {
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerModal').classList.remove('show');
}
document.getElementById('playerModal').addEventListener('click', function(e) { if (e.target === this) closePlayer(); });

const STREAMED = 'https://streamed.pk';
let allMatches = [];
let sportCategories = [];
let activeSportFilter = null;
let activeSportsTab = 'live';

document.querySelectorAll('#section-sports .tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#section-sports .tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSportsTab = btn.dataset.stab;
    renderSports();
  });
});

async function loadSports() {
  try { const r = await fetch(`${STREAMED}/api/sports`); sportCategories = await r.json(); } catch (e) { sportCategories = []; }
  const fl = document.getElementById('sport-filters');
  fl.innerHTML = `<button class="pill ${!activeSportFilter?'active':''}" onclick="activeSportFilter=null;renderSports()">All</button>`;
  for (const s of sportCategories) fl.innerHTML += `<button class="pill ${activeSportFilter===s.id?'active':''}" onclick="activeSportFilter='${s.id}';renderSports()">${s.name}</button>`;
  await fetchAllMatches();
}

async function fetchAllMatches() {
  try {
    const [liveData, todayData, allData] = await Promise.all([
      fetch(`${STREAMED}/api/matches/live`).then(r => r.json()).catch(() => []),
      fetch(`${STREAMED}/api/matches/all-today`).then(r => r.json()).catch(() => []),
      fetch(`${STREAMED}/api/matches/all`).then(r => r.json()).catch(() => []),
    ]);
    const matches = [...(Array.isArray(liveData)?liveData:[]), ...(Array.isArray(todayData)?todayData:[]), ...(Array.isArray(allData)?allData:[])];
    const seen = new Set();
    allMatches = matches.filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
  } catch (e) { console.warn('Sports fetch failed', e); allMatches = []; }
  renderSports();
}

function renderSports() {
  const el = document.getElementById('sports-content');
  let filtered = [...allMatches];
  if (activeSportFilter) filtered = filtered.filter(m => m.category === activeSportFilter);
  const now = Date.now();
  if (activeSportsTab === 'live') filtered = filtered.filter(m => m.date >= now - 10800000 && m.date <= now + 3600000);
  else if (activeSportsTab === 'today') {
    const sod = new Date(); sod.setHours(0,0,0,0);
    const eod = new Date(); eod.setHours(23,59,59,999);
    filtered = filtered.filter(m => m.date >= sod.getTime() && m.date <= eod.getTime());
  }
  filtered.sort((a, b) => a.date - b.date);
  const fl = document.getElementById('sport-filters');
  if (!fl.querySelector('.count')) { const c = document.createElement('span'); c.className = 'count'; fl.appendChild(c); }
  fl.querySelector('.count').textContent = `${filtered.length} matches`;
  if (!filtered.length) { el.innerHTML = '<div class="empty-state"><h3>No matches found</h3><p>Try a different filter</p></div>'; return; }
  let html = '<div class="sport-grid">';
  for (const m of filtered) {
    const d = new Date(m.date);
    const isLive = m.date >= now - 7200000 && m.date <= now;
    const isUpcoming = m.date > now;
    const sc = isLive ? 'live' : isUpcoming ? 'upcoming' : 'finished';
    const st = isLive ? 'LIVE' : isUpcoming ? 'UPCOMING' : 'FINISHED';
    const sName = sportCategories.find(s => s.id === m.category)?.name || m.category;
    const posterPath = m.poster ? `${STREAMED}${m.poster}` : null;
    const sfavId = 'tm-' + m.id;
    const sIsFav = isFavorite(sfavId);
    const sTitle = (m.title || (m.teams?.home?.name||'?') + ' vs ' + (m.teams?.away?.name||'?')).replace(/'/g,'');
    html += `<div class="sport-card" tabindex="0" role="button" onclick="openSportStream('${m.id}')">
      ${posterPath ? `<div class="sport-bg" style="background-image:url('${posterPath}')"></div>` : ''}
      <div class="sport-content">
        <div class="teams">
          ${m.teams?.home ? `<div class="badge-img">${m.teams.home.badge ? `<img src="${STREAMED}/api/images/proxy/${m.teams.home.badge}.webp" alt="" loading="lazy" onerror="this.closest('.badge-img').innerHTML='${m.teams.home.name[0].replace(/'/g,'')}'">` : m.teams.home.name[0]}</div>` : ''}
          <div class="team-name">${m.teams?.home?.name || '?'}</div>
          <div class="vs">vs</div>
          ${m.teams?.away ? `<div class="badge-img">${m.teams.away.badge ? `<img src="${STREAMED}/api/images/proxy/${m.teams.away.badge}.webp" alt="" loading="lazy" onerror="this.closest('.badge-img').innerHTML='${m.teams.away.name[0].replace(/'/g,'')}'">` : m.teams.away.name[0]}</div>` : ''}
          <div class="team-name">${m.teams?.away?.name || '?'}</div>
          <button class="fav-btn ${sIsFav?'active':''}" onclick="event.stopPropagation();toggleFavorite('${sfavId}','${sTitle}',{type:'tm'});this.classList.toggle('active')">${sIsFav?'★':'☆'}</button>
        </div>
        <div class="match-info">
          <span class="tag ${sc}">${st}</span><span>${sName}</span><span> · ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
          ${m.sources?.length ? ` · ${m.sources.length} stream${m.sources.length>1?'s':''}` : ''}
        </div>
      </div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

async function openSportStream(matchId) {
  const match = allMatches.find(m => m.id === matchId);
  if (!match || !match.sources?.length) return;
  // Fetch all streams from all sources in parallel
  const results = await Promise.allSettled(
    match.sources.map(src =>
      fetch(`${STREAMED}/api/stream/${src.source}/${src.id}`).then(r => r.json()).then(arr => arr.map(s => ({ ...s, sourceLabel: src.source })))
    )
  );
  let allStreams = [];
  for (const r of results) { if (r.status === 'fulfilled') allStreams.push(...r.value); }
  if (!allStreams.length) { alert('No streams available'); return; }
  // Sort: HD first, then by stream number
  allStreams.sort((a, b) => {
    if (a.hd !== b.hd) return a.hd ? -1 : 1;
    return (a.streamNo || 0) - (b.streamNo || 0);
  });
  // If only one option, play directly
  if (allStreams.length === 1) {
    openPlayer(allStreams[0].embedUrl, match.title, `${allStreams[0].hd ? 'HD' : 'SD'} · ${allStreams[0].sourceLabel}`);
    return;
  }
  // Show picker
  const title = match.title || `${match.teams?.home?.name || '?'} vs ${match.teams?.away?.name || '?'}`;
  document.getElementById('sp-title').textContent = title;
  document.getElementById('sp-sub').textContent = `${allStreams.length} streams available`;
  let listHtml = '';
  for (const s of allStreams) {
    const label = s.hd ? `<span class="hd-badge">HD</span>` : `<span class="sd-badge">SD</span>`;
    const srcLabel = s.sourceLabel || s.source || 'stream';
    listHtml += `<button class="stream-opt" onclick="openPlayer('${s.embedUrl}','${title.replace(/'/g,'')}','${s.hd ? 'HD' : 'SD'} · ${srcLabel}');closeStreamPicker()">
      <span>${srcLabel} #${s.streamNo || 1} ${s.hd ? 'HD' : 'SD'}</span>
      ${label}
    </button>`;
  }
  document.getElementById('sp-list').innerHTML = listHtml;
  document.getElementById('streamPicker').classList.add('show');
}

function closeStreamPicker() {
  document.getElementById('streamPicker').classList.remove('show');
}
document.getElementById('streamPicker').addEventListener('click', function(e) { if (e.target === this) closeStreamPicker(); });

const CDNTV = 'https://api.cdnlivetv.tv/api/v1';
let allChannels = [];
let tvFilterText = '';
let tvFilterCountry = 'all';

async function loadTVChannels() {
  const el = document.getElementById('tv-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><span>Loading channels...</span></div>';
  try {
    const r = await fetch(`${CDNTV}/channels/?user=cdnlivetv&plan=free`);
    const data = await r.json();
    allChannels = data.channels || [];
    const countries = [...new Set(allChannels.map(c => c.code).filter(Boolean))].sort();
    const pills = document.getElementById('tv-country-pills');
    pills.innerHTML = `<span class="pill active" data-code="all" onclick="setCountryPill('all',this)">All</span>`;
    for (const code of countries) pills.innerHTML += `<span class="pill" data-code="${code}" onclick="setCountryPill('${code}',this)">${code.toUpperCase()}</span>`;
    document.getElementById('channel-count').textContent = `${allChannels.length} channels`;
    renderChannels();
  } catch (e) { el.innerHTML = `<div class="empty-state"><h3>Failed to load channels</h3><p>${e.message}</p></div>`; }
}

function setCountryPill(code, el) {
  document.querySelectorAll('#tv-country-pills .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  tvFilterCountry = code;
  renderChannels();
}

function filterChannels() {
  tvFilterText = document.getElementById('tv-search-input').value.trim().toLowerCase();
  renderChannels();
}

function renderChannels() {
  const el = document.getElementById('tv-content');
  let filtered = allChannels.filter(c => {
    if (tvFilterText && !c.name.toLowerCase().includes(tvFilterText)) return false;
    if (tvFilterCountry !== 'all' && c.code !== tvFilterCountry) return false;
    return true;
  });
  if (!filtered.length) { el.innerHTML = '<div class="empty-state"><h3>No channels found</h3><p>Try a different search</p></div>'; return; }
  let html = '<div class="channel-grid">';
  filtered.sort((a, b) => (a.status === 'online' ? -1 : 1) - (b.status === 'online' ? -1 : 1));
  for (const ch of filtered.slice(0, 200)) {
    const online = ch.status === 'online';
    html += `<div class="channel-card" tabindex="0" role="button" onclick="openTVChannel('${encodeURIComponent(ch.name)}','${ch.code}')">
      ${online ? '<div class="ch-online-bg"></div>' : ''}
      <div class="ch-logo">${ch.image ? `<img src="${ch.image}" alt="${ch.name}" loading="lazy" onerror="this.closest('.ch-logo').innerHTML='${ch.name[0].replace(/'/g,"")}'">` : ch.name[0]}</div>
      <div class="ch-name">${ch.name}</div>
      <div class="ch-status ${online ? 'online' : 'offline'}">${online ? '<span class="live-dot"></span> LIVE' : 'Offline'} <span class="country-tag">${ch.code?.toUpperCase() || ''}</span></div>
      <div class="ch-category">${ch.type || ch.category || ''}</div>
    </div>`;
  }
  html += '</div>';
  if (filtered.length > 200) html += `<div style="text-align:center;padding:12px;font-size:13px;color:var(--text2)">Showing 200 of ${filtered.length} channels</div>`;
  el.innerHTML = html;
}

function openTVChannel(name, code) {
  const decoded = decodeURIComponent(name);
  const url = `https://cdnlivetv.tv/api/v1/channels/player/?name=${encodeURIComponent(decoded.toLowerCase())}&code=${code}&user=cdnlivetv&plan=free`;
  openPlayer(url, decoded, 'Live TV');
}

loadMovieHome();
loadSports();
loadTVChannels();
</script>
